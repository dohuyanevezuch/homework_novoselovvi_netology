global_defs {
        enable_script_security
        script_user keepalived_script
}
vrrp_script check_server {
        script "/bin/bash /keepalived-script/check-server.sh"
        interval 3
        weight -2
        fall 2
        rise 2
}
vrrp_instance VI_1 {
        state BACKUP
        interface enp0s8
        virtual_router_id 10
        priority 200
        advert_int 1

        virtual_ipaddress {
              192.168.56.10/24
        }
        track_script {
                check_server
        }

}
