#cloud-config

package_update: true

packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    permissions: '0644'
    content: '<h1>HOSTNAME</h1>'
runcmd:
  - |
    HOSTNAME=$(hostname)
    sed -i "s/HOSTNAME/$HOSTNAME/" /var/www/html/index.html
  - systemctl enable nginx
  - systemctl start nginx
